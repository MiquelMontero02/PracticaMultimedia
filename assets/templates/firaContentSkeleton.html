<section id="weather-section">
    <div id="meteo" class="meteo-container">
        <!-- El contenido del clima se generará aquí -->
    </div>
</section>
<section id="description-section">
    <div class="container" data-aos="fade-up">
        <div class="row gy-4 align-items-center">
            <div class="col-lg-4">
                <img id="event-img" class="menu-img img-fluid">
            </div>
            <div class="col-lg-8">
                <div class="section-header">
                    <p id="event-name"></p>
                </div>
                <h2>Fecha de inicio:</h2><span id="start-date"></span>
                <h2>Fecha de fin:</h2><span id="end-date"></span>
                <h2>Descripción:</h2>
                <p id="description" class="ingredients"></p>
                <h2>Ubicación: </h2>
                <span id="address"></span>
                <div id="map"></div>
            </div>
        </div>
    </div>
</section>
<section id="gallery-section">
    <h2>Galería de imágenes</h2>
    <div id="gallery" class="gallery-container">
        <!-- Las imágenes se generarán aquí -->
    </div>
</section>
<section id="activities-section">
    <h2>Actividades</h2>
    <div id="activities" class="activities-container">
        <!-- Las actividades se generarán aquí -->
    </div>
</section>
<section id="related-section">
    <h2>Fires relacionadas</h2>
    <div id="related" class="related-container">
        <!-- Las fires relacionadas se generarán aquí -->
    </div>
</section>
